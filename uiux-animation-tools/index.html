    <script>
        (function() {
            const savedTheme = localStorage.getItem('uiVariantMain') || localStorage.getItem('uiVariant');
            const selectedTheme = savedTheme === 'variant-2-neumorphism' ? savedTheme : 'variant-1-glass';
            const preset = selectedTheme === 'variant-2-neumorphism'
                ? (localStorage.getItem('uiNeumorphismVariantPreset') || 'custom:初期設定')
                : (localStorage.getItem('uiVariantPreset') || 'custom:初期設定');
            document.body.setAttribute('data-ui-booting', '1');
            // Glass の既存レイアウト指定を常に土台として保持し、外観テーマだけを重ねる。
            document.body.setAttribute('data-ui-variant', 'variant-1-glass');
            document.body.setAttribute('data-ui-theme', selectedTheme === 'variant-2-neumorphism' ? 'neumorphism' : 'glass');
            document.body.setAttribute('data-ui-preset', preset === 'default' ? '1' : preset);
        })();
    </script>

                            <div class="ui-size-tuner-group-head"><h3>初期設定</h3><button type="button" class="ui-size-tuner-group-toggle" data-user-initial-settings-action="refresh">更新</button></div>
                            <p class="ui-size-tuner-engine-note">このChromeプロファイル内の登録状態をJSON化します。別Chromeへ移す場合は、JSONダウンロード後、別Chromeで「JSONを読み込んで反映」を使ってください。</p>
                            ${userInitialSettingsFeedback ? `<div class="ui-size-tuner-engine-note" style="border:1px solid rgba(18,24,34,0.10); border-radius:10px; padding:8px; background:${userInitialSettingsFeedbackKind === 'error' ? 'rgba(255,90,90,0.10)' : 'rgba(80,150,255,0.08)'};">${escapeInitialSettingsHtml(userInitialSettingsFeedback)}</div>` : ''}
                            ${renderInitialSettingsSummaryGrid(summary)}
                            <div class="ui-size-tuner-actions" style="position:static; inset:auto; padding:0; margin-top:8px; background:transparent; box-shadow:none; border-top:0; display:flex; flex-direction:column; gap:8px;">
                                <div style="display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px;">
                                    <button type="button" data-user-initial-settings-action="import-apply" style="font-weight:700; min-height:44px; padding:12px 14px; box-shadow:inset 0 1px 0 rgba(255,255,255,0.45), 0 0 0 1px rgba(40,100,255,0.20);">JSONを読み込んで反映</button>
                                    <button type="button" data-user-initial-settings-action="download" style="font-weight:700; min-height:44px; padding:12px 14px;">JSONダウンロード</button>
                                </div>
                                <button type="button" data-user-initial-settings-action="register-current" style="font-weight:700; min-height:44px; padding:12px 14px; box-shadow:inset 0 1px 0 rgba(255,255,255,0.45), 0 0 0 1px rgba(40,100,255,0.20);">このブラウザの初期設定に登録</button>
                                <p class="ui-size-tuner-engine-note" style="margin:0;">このChromeプロファイル内で、次回以降の初期状態として使います。別Chromeへ移す場合はJSONダウンロードを使ってください。</p>
                                <p class="ui-size-tuner-engine-note" style="margin:0;">別Chromeへ移す場合は、JSONダウンロード後、別Chromeで JSONを読み込んで反映 を使います。</p>
                                <div style="display:flex; justify-content:flex-end;">
                                    <button type="button" data-user-initial-settings-action="reload" ${userInitialSettingsReloadAvailable ? '' : 'disabled'} style="font-size:11px; min-height:28px; padding:5px 10px;">再読み込み</button>
                                </div>
                                <details style="margin-top:2px;">
                                    <summary style="cursor:pointer; font-size:12px; font-weight:700; color:rgba(18,24,34,0.72); list-style:none;">詳細操作</summary>
                                    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;">
                                        <button type="button" data-user-initial-settings-action="copy">JSONコピー</button>
                                        <label class="ui-size-tuner-import-label">JSON読み込みのみ<input type="file" accept="application/json,.json" data-user-initial-settings-import-input></label>
                                        <button type="button" data-user-initial-settings-action="apply" ${previewOk ? '' : 'disabled'}>読み込み済みJSONを反映</button>
                                        <button type="button" data-user-initial-settings-action="download-registered" ${registeredReport ? '' : 'disabled'}>登録済み初期設定を書き出し</button>
                                        <button type="button" data-user-initial-settings-action="download-default-user-state">default-user-state用JSONを書き出し</button>
                                    </div>
                                </details>
                                <input type="file" accept="application/json,.json" data-user-initial-settings-import-input="apply" hidden>
                            </div>
                        </div>
                        ${renderRegisteredInitialSettingsReport(registeredReport)}
                        ${previewReport ? `<div class="ui-size-tuner-group" style="padding:12px;"><div class="ui-size-tuner-group-head"><h3>読み込み済みプレビュー</h3><button type="button" class="ui-size-tuner-group-toggle" disabled>${previewOk ? 'OK' : 'NG'}</button></div><p class="ui-size-tuner-engine-note">${escapeInitialSettingsHtml(userInitialSettingsPreviewFileName || '選択済みJSON')}</p>${validation?.warnings?.length ? `<p class="ui-size-tuner-engine-note">${validation.warnings.map(escapeInitialSettingsHtml).join('<br>')}</p>` : ''}</div>` : ''}
                        <div class="ui-size-tuner-group" style="padding:12px;"><div class="ui-size-tuner-group-head"><h3>収集項目</h3><button type="button" class="ui-size-tuner-group-toggle" disabled>現在</button></div></div>
                        ${renderInitialSettingsPresenceRows(report)}
                        <div class="ui-size-tuner-group" style="padding:12px;"><div class="ui-size-tuner-group-head"><h3>登録スロット内容</h3><button type="button" class="ui-size-tuner-group-toggle" disabled>${summary.registeredSlotCount || 0}</button></div>${renderInitialSettingsSlotRows(report)}</div>
                        </div>
                    `;
                    if (pageEl.dataset.userInitialSettingsListenersBound === 'true') return;
                    pageEl.dataset.userInitialSettingsListenersBound = 'true';
                    pageEl.addEventListener('click', async (event) => {
                        const actionButton = event.target.closest('[data-user-initial-settings-action]');
                        if (!actionButton || !pageEl.contains(actionButton)) return;
                        event.preventDefault();
                        event.stopPropagation();
                        const action = actionButton.getAttribute('data-user-initial-settings-action');
                        if (action === 'refresh') {
                            refreshInitialSettingsTunerPage();
                            return;
                        }
                        if (action === 'copy') {
                            const copied = await copyText(JSON.stringify(api.exportUserInitialSettings(), null, 2));
                            setInitialSettingsFeedback(copied ? 'JSONをコピーしました。' : 'JSONのコピーに失敗しました。', copied ? 'ok' : 'error');
                            return;
                        }
                        if (action === 'download') {
                            api.downloadUserInitialSettings();
                            setInitialSettingsFeedback('JSONをダウンロードしました。別Chromeへ移す場合は、別Chromeで JSONを読み込んで反映 を使ってください。', 'ok');
                            return;
                        }
                        if (action === 'register-current') {
                            const savedPayload = api.saveCurrentStateAsUserInitialSettings ? api.saveCurrentStateAsUserInitialSettings() : null;
                            if (!savedPayload) {
                                setInitialSettingsFeedback('初期設定の登録に失敗しました。', 'error');
                                return;
                            }
                            refreshInitialSettingsTunerPage();
                            setInitialSettingsFeedback('このブラウザの初期設定として登録しました。', 'ok');
                            return;
                        }
                        if (action === 'import-apply') {
                            const importInput = pageEl.querySelector('[data-user-initial-settings-import-input="apply"]');
                            importInput?.click();
                            return;
                        }
                        if (action === 'apply') {
                            if (!userInitialSettingsPreviewPayload) {
                                setInitialSettingsFeedback('先に JSON を読み込んでください。', 'error');
                                return;
                            }
                            const result = api.applyUserInitialSettings(userInitialSettingsPreviewPayload, { reload: false });
                            if (!result || result.ok !== true) {
                                setInitialSettingsFeedback((result?.validation?.warnings || ['反映に失敗しました。']).join(' / '), 'error');
                                return;
                            }
                            syncRuntimeAfterInitialSettingsApply();
                            setInitialSettingsFeedback(`反映しました。${result.appliedKeys.length ? `(${result.appliedKeys.length}件)` : ''} 再読み込みしてください。`, 'ok');
                            return;
                        }
                        if (action === 'download-registered') {
                            const downloaded = api.downloadStoredUserInitialSettings ? api.downloadStoredUserInitialSettings() : false;
                            if (!downloaded) {
                                setInitialSettingsFeedback('先に現在の状態を初期設定に登録してください。', 'error');
                                return;
                            }
                            setInitialSettingsFeedback('登録済み初期設定を書き出しました。', 'ok');
                            return;
                        }
                        if (action === 'download-default-user-state') {
                            const downloaded = api.downloadDefaultUserStateJson ? api.downloadDefaultUserStateJson() : false;
                            if (!downloaded) {
                                setInitialSettingsFeedback('default-user-state用JSONの書き出しに失敗しました。', 'error');
                                return;
                            }
                            setInitialSettingsFeedback('default-user-state用JSONを書き出しました。', 'ok');
                            return;
                        }
                        if (action === 'reload') {
                            window.location.reload();
                        }
                    });
                    pageEl.addEventListener('change', async (event) => {
                        const importInput = event.target.closest('[data-user-initial-settings-import-input]');
                        if (!importInput || !pageEl.contains(importInput)) return;
                        const file = importInput.files && importInput.files[0];
                        importInput.value = '';
                        if (!file) return;
                        const applyImmediately = importInput.getAttribute('data-user-initial-settings-import-input') === 'apply';
                        await handleUserInitialSettingsImportedFile(file, { applyImmediately });
                    });
                }
                function refreshInitialSettingsTunerPage() {
                    const pageEl = pageEls.get('初期設定');
                    if (pageEl) renderInitialSettingsTunerPage(pageEl);
                }
                function compactTargetText(rawTargets) {
                    const list = (rawTargets || [])
                        .filter(Boolean)
                        .filter((target) => !String(target).includes('#color-container'));
                    if (!list.length) return '共通';
                    if (list.length === 1) return list[0];
                    return `${list[0]} 他${list.length - 1}`;
                }
                function updateStatus(extraControl) {
                    const activeGroups = controls.filter((c) => c.page === currentPage).map((c) => `${c.page}::${c.group}`);
                    const onCount = new Set(activeGroups.filter((key) => state.enabled[key] !== false)).size;
                    const allCount = new Set(activeGroups).size;
                    const rawTargets = extraControl ? (extraControl.targets || []) : (panelIdsByPage[currentPage] || []).map((id) => `#${id}`);
                    const target = compactTargetText(rawTargets);
                    const fullTarget = (rawTargets || []).filter((item) => !String(item).includes('#color-container')).join(', ') || '共通';
                    status.title = `反映先: ${fullTarget}`;
                    status.innerHTML = `<b>現在:</b> ${currentPage} / <b>ON:</b> ${onCount}/${allCount} / <b>反映先:</b> <span>${target}</span>`;
                }
                pages.forEach((page, index) => {
                    const tab = document.createElement('button');
                    tab.type = 'button';
                    tab.className = `ui-size-tuner-tab${index === 0 ? ' is-active' : ''}`;
                    tab.dataset.uiSizePage = page;
                    tab.textContent = page;
                    tabs.appendChild(tab);
                    const pageEl = document.createElement('div');
                    pageEl.className = `ui-size-tuner-page${index === 0 ? ' is-active' : ''}`;
                    pageEl.dataset.uiSizePage = page;
                    body.appendChild(pageEl);
                    pageEls.set(page, pageEl);
                    if (page === 'UI切替') renderVariantCompactTunerPage(pageEl);
                    if (page === '初期設定') renderInitialSettingsTunerPage(pageEl);
                    if (page === 'Engine') renderEngineTunerPage(pageEl);
                });
                tabs.addEventListener('click', (event) => {
                    const page = event.target.closest('[data-ui-size-page]')?.dataset.uiSizePage;
                    if (!page) return;
                    currentPage = page;
                    tabs.querySelectorAll('.ui-size-tuner-tab').forEach((el) => el.classList.toggle('is-active', el.dataset.uiSizePage === page));
                    pageEls.forEach((el, key) => el.classList.toggle('is-active', key === page));
                    if (page === 'Engine') refreshEngineTunerPage();
                    else if (page === 'UI切替') refreshVariantCompactTunerPage();
                    else if (page === '初期設定') refreshInitialSettingsTunerPage();
                    else openTargetsForPage(page);
                    updateStatus();
                });
                const groupEls = new Map();
                controls.forEach((control) => {
                    const pageEl = pageEls.get(control.page) || pageEls.get('共通');
                    const groupKey = `${control.page}::${control.group}`;
                    if (!groupEls.has(groupKey)) {
                        const group = document.createElement('div');
                        group.className = `ui-size-tuner-group${state.enabled[groupKey] === false ? ' is-off' : ''}`;
                        group.dataset.groupKey = groupKey;
                        group.innerHTML = `<div class="ui-size-tuner-group-head"><h3>${control.group}</h3><button type="button" class="ui-size-tuner-group-toggle" data-ui-size-group="${groupKey}">${state.enabled[groupKey] === false ? 'OFF' : 'ON'}</button></div>`;
                        groupEls.set(groupKey, group);
                        pageEl.appendChild(group);
                    }
                    if (state.values[control.name] == null) state.values[control.name] = control.defaultValue;
                    const row = document.createElement('label');
                    row.className = `ui-size-tuner-row${control.type === 'guide' ? ' ui-size-tuner-row-guide' : ''}${control.type === 'color' ? ' ui-size-tuner-row-color' : ''}`;
                    row.title = `${control.name}
${(control.targets || []).join(', ')}`;
                    if (control.type === 'guide') {
                        row.innerHTML = `<span class="ui-size-tuner-label">${control.label}</span><input type="checkbox" ${state.values[control.name] !== false ? 'checked' : ''} data-ui-size-var="${control.name}"><span class="ui-size-tuner-value">${formatValue(control, state.values[control.name])}</span><span class="ui-size-tuner-computed">表示ガイド</span>`;
                    } else if (control.type === 'color') {
                        row.innerHTML = `<span class="ui-size-tuner-label">${control.label}</span><input type="color" value="${state.values[control.name] || control.defaultValue}" data-ui-size-var="${control.name}"><span class="ui-size-tuner-value">${formatValue(control, state.values[control.name])}</span><span class="ui-size-tuner-computed">${getComputedText(control)}</span>`;
                    } else {
                        row.innerHTML = `<span class="ui-size-tuner-label">${control.label}</span><input type="range" min="${control.min}" max="${control.max}" step="${control.step}" value="${state.values[control.name]}" data-ui-size-var="${control.name}"><span class="ui-size-tuner-value">${formatValue(control, state.values[control.name])}</span><span class="ui-size-tuner-computed">${getComputedText(control)}</span>`;
                    }
                    const input = row.querySelector('input');
                    const output = row.querySelector('.ui-size-tuner-value');
                    const computed = row.querySelector('.ui-size-tuner-computed');
                    input.disabled = !isGroupEnabled(control);
                    const updateOne = () => {
                        const nextValue = control.type === 'guide' ? input.checked : (control.type === 'color' ? input.value : Number(input.value));
                        state.values[control.name] = nextValue;
                        if (control.type !== 'guide' && isGroupEnabled(control)) setControlValue(control, nextValue);
                        output.textContent = formatValue(control, nextValue);
                        if (computed) computed.textContent = control.type === 'guide' ? '表示ガイド' : getComputedText(control);
                        highlightTargets(control);
                        updateStatus(control);
                        persist();
                    };
                    input.addEventListener((control.type === 'guide' || control.type === 'color') ? 'change' : 'input', updateOne);
                    input.addEventListener('focus', () => { highlightTargets(control); updateStatus(control); });
                    input.addEventListener('pointerenter', () => { highlightTargets(control); updateStatus(control); });
                    groupEls.get(groupKey).appendChild(row);
                });
                panel.addEventListener('click', (event) => {
                    const groupButton = event.target.closest('[data-ui-size-group]');
                    if (groupButton) {
                        const key = groupButton.dataset.uiSizeGroup;
                        state.enabled[key] = !(state.enabled[key] !== false);
                        const group = groupEls.get(key);
                        group.classList.toggle('is-off', state.enabled[key] === false);
                        groupButton.textContent = state.enabled[key] === false ? 'OFF' : 'ON';
                        controls.filter((control) => `${control.page}::${control.group}` === key).forEach((control) => {
                            if (control.type !== 'guide') {
                                if (state.enabled[key] === false) removeControlValue(control);
                                else setControlValue(control, state.values[control.name] ?? control.defaultValue);
                            }
                            const input = panel.querySelector(`[data-ui-size-var="${control.name}"]`);
                            if (input) input.disabled = state.enabled[key] === false;
                            const row = input?.closest('.ui-size-tuner-row');
                            const computed = row?.querySelector('.ui-size-tuner-computed');
                            if (computed) computed.textContent = control.type === 'guide' ? '表示ガイド' : getComputedText(control);
                        });
                        persist(); updateStatus();
                        return;
                    }
                    const dock = event.target.closest('[data-ui-size-dock]')?.dataset.uiSizeDock;
                    if (dock) { dockPanel(panel, toggle, dock); return; }
                    const action = event.target.closest('[data-ui-size-action]')?.dataset.uiSizeAction;
                    if (!action) return;
                    if (action === 'close') { panel.classList.remove('is-open'); toggle.setAttribute('aria-expanded', 'false'); }
                    if (action === 'reset') {
                        state.values = {...defaults};
                        state.enabled = Object.fromEntries(groupKeys.map((key) => [key, true]));
                        localStorage.removeItem(storageKey);
                        applyAllValues();
                        panel.querySelectorAll('[data-ui-size-var]').forEach((input) => {
                            const control = controls.find((item) => item.name === input.dataset.uiSizeVar);
                            if (control.type === 'guide') input.checked = control.defaultValue !== false;
                            else input.value = control.defaultValue;
                            input.disabled = false;
                            input.closest('.ui-size-tuner-row').querySelector('.ui-size-tuner-value').textContent = formatValue(control, control.defaultValue);
                            input.closest('.ui-size-tuner-row').querySelector('.ui-size-tuner-computed').textContent = control.type === 'guide' ? '表示ガイド' : getComputedText(control);
                        });
                        groupEls.forEach((group, key) => { group.classList.remove('is-off'); group.querySelector('.ui-size-tuner-group-toggle').textContent = 'ON'; });
                        updateStatus();
                    }
                    if (action === 'copy') {
                        const mode = panel.querySelector('[data-ui-size-copy-mode]').value;
                        copyText(buildCss(mode, currentPage));
                    }
                    if (action === 'export-json') {
                        downloadTextFile(`ui-size-tuner-${new Date().toISOString().slice(0,10)}.json`, buildExportPayload());
                    }
                    if (action === 'save-preset') {
                        const name = panel.querySelector('[data-ui-size-preset-name]').value.trim() || `preset-${Date.now()}`;
                        state.presets[name] = { values: {...state.values}, enabled: {...state.enabled} };
                        persist(); renderPresetSelect();
                    }
                    if (action === 'load-preset') {
                        const name = panel.querySelector('[data-ui-size-preset-select]').value;
                        const preset = state.presets[name];
                        if (preset) { state.values = {...preset.values}; state.enabled = {...state.enabled, ...preset.enabled}; persist(); panel.remove(); toggle.remove(); init(); }
                    }
                    if (action === 'delete-preset') {
                        const name = panel.querySelector('[data-ui-size-preset-select]').value;
                        delete state.presets[name]; persist(); renderPresetSelect();
                    }
                    if (action === 'open-targets') openTargetsForPage(currentPage);
                });
                const actions = document.createElement('div');
                actions.className = 'ui-size-tuner-actions';
                actions.innerHTML = `<button type="button" data-ui-size-action="open-targets">対象を開く</button><button type="button" data-ui-size-action="reset">初期値へ戻す</button><select data-ui-size-copy-mode><option value="diff">差分だけ</option><option value="tab">現在タブ</option><option value="all">全部</option></select><button type="button" data-ui-size-action="copy">CSS変数をコピー</button><button type="button" data-ui-size-action="export-json">エクスポート</button><label class="ui-size-tuner-import-label">インポート<input type="file" accept="application/json,.json" data-ui-size-import-file></label><input type="text" data-ui-size-preset-name placeholder="プリセット名"><select data-ui-size-preset-select></select><button type="button" data-ui-size-action="save-preset">保存</button><button type="button" data-ui-size-action="load-preset">読込</button><button type="button" data-ui-size-action="delete-preset">削除</button><button type="button" data-ui-size-action="close">閉じる</button>`;
                panel.appendChild(actions);
                function renderPresetSelect() {
                    const select = panel.querySelector('[data-ui-size-preset-select]');
                    if (!select) return;
                    select.innerHTML = Object.keys(state.presets).map((name) => `<option value="${name}">${name}</option>`).join('');
                }
                renderPresetSelect();
                const importInput = panel.querySelector('[data-ui-size-import-file]');
                if (importInput) {
                    importInput.addEventListener('change', async () => {
                        const file = importInput.files && importInput.files[0];
                        if (!file) return;
                        const text = await file.text();
                        if (applyImportedPayload(text)) {
                            panel.remove();
                            toggle.remove();
                            init();
                        }
                    });
                }
                toggle.addEventListener('click', () => {
                    const isOpen = panel.classList.toggle('is-open');
                    toggle.setAttribute('aria-expanded', String(isOpen));
                    if (isOpen) { openTargetsForPage(currentPage); updateStatus(); }
                });
                document.body.appendChild(toggle);
                document.body.appendChild(panel);
                applyPanelPosition(panel, toggle);
                makeDraggable(panel, panel.querySelector('.ui-size-tuner-head'));
                updateStatus();
            }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>

    <script id="ui-v73-bottom-color-neighbor-style-sync">
        (() => {
            const copyProps = [
                'width','height','minWidth','minHeight','maxWidth','maxHeight',
                'borderRadius','borderTopWidth','borderRightWidth','borderBottomWidth','borderLeftWidth',
                'borderTopStyle','borderRightStyle','borderBottomStyle','borderLeftStyle',
                'borderTopColor','borderRightColor','borderBottomColor','borderLeftColor',
                'backgroundColor','backgroundImage','boxShadow','filter','backdropFilter'
            ];
            function findReferenceButton(colorButton) {
                if (!colorButton) return null;
                const bar = colorButton.closest('#glass-control-bar') || document.getElementById('glass-control-bar');
                if (!bar) return null;
                const candidates = Array.from(bar.querySelectorAll('.glass-control-pill'))
                    .filter((el) => el !== colorButton && !el.classList.contains('canvas-bottom-color-button'));
                return candidates.find((el) => /残像表示|流線表示|配置リセット|次へ/.test(el.textContent || '')) || candidates[0] || null;
            }
            function syncBottomColorButton() {
                const button = document.querySelector('#glass-control-bar .canvas-bottom-color-button.glass-control-pill');
                const ref = findReferenceButton(button);
                if (!button || !ref) return;
                const cs = getComputedStyle(ref);
                copyProps.forEach((prop) => {
                    const cssName = prop.replace(/[A-Z]/g, (m) => '-' + m.toLowerCase());
                    const value = cs.getPropertyValue(cssName);
                    if (value) button.style.setProperty(cssName, value, 'important');
                });
                button.style.setProperty('padding', '0', 'important');
                button.style.setProperty('outline', '0', 'important');
                button.style.setProperty('overflow', 'hidden', 'important');
                button.style.setProperty('position', 'relative', 'important');
            }
            window.UIUXSyncBottomColorButton = syncBottomColorButton;
            let bottomColorSyncTimer = null;
            function queueBottomColorSync() {
                if (bottomColorSyncTimer) window.clearTimeout(bottomColorSyncTimer);
                bottomColorSyncTimer = window.setTimeout(() => {
                    bottomColorSyncTimer = null;
                    syncBottomColorButton();
                }, 90);
            }
            window.UIUXRequestBottomColorButtonSync = queueBottomColorSync;
            const run = () => queueBottomColorSync();
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run, { once: true });
            else run();
            window.addEventListener('load', run, { once: true });
            window.addEventListener('resize', run);
            document.addEventListener('click', (event) => {
                if (event.target.closest('#glass-control-bar') || event.target.closest('#ui-variant-panel') || event.target.closest('#ui-variant-compact-panel')) {
                    queueBottomColorSync();
                }
            }, true);
            document.addEventListener('change', (event) => {
                if (event.target.closest('#glass-control-bar') || event.target.closest('#ui-variant-panel') || event.target.closest('#ui-variant-compact-panel')) {
                    queueBottomColorSync();
                }
            }, true);
        })();
    </script>
